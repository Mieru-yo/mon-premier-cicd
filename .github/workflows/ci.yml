name: CI - Lint, Tests & Coverage

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Installation des dependances
        run: npm ci

      - name: Verification ESLint
        run: npm run lint

  test:
    name: Tests Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Installation des dependances
        run: npm ci

      - name: Tests unitaires + couverture
        run: npm run test:ci

      - name: Resume de couverture
        if: always()
        run: |
          echo '## Couverture de code - Node ${{ matrix.node-version }}' >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            cat coverage/coverage-summary.json | node -e "
              const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const t = data.total;
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Statements | ' + t.statements.pct + '% |');
              console.log('| Branches   | ' + t.branches.pct   + '% |');
              console.log('| Functions  | ' + t.functions.pct  + '% |');
              console.log('| Lines      | ' + t.lines.pct      + '% |');
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 14

      - name: Commenter la PR avec la couverture
        if: github.event_name == 'pull_request' && matrix.node-version == 18
        uses: MishaKav/jest-coverage-comment@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-summary-path: ./coverage/coverage-summary.json

  ci-success:
    name: CI complet
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    if: always()

    steps:
      - name: Verifier que tout est vert
        run: |
          if [ '${{ needs.lint.result }}' != 'success' ]; then
            echo 'Lint a echoue !'
            exit 1
          fi

          if [ '${{ needs.test.result }}' != 'success' ]; then
            echo 'Tests ont echoue !'
            exit 1
          fi

          echo 'CI entierement vert'

  notify-failure:
    name: Notifier echec
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    if: always() && (needs.lint.result != 'success' || needs.test.result != 'success')

    steps:
      - name: Notifier via webhook
        run: |
          curl -sS -f -X POST -H 'Content-type: application/json' \
            --data '{"text":"Pipeline CI echoue sur ${{ github.repository }} - ${{ github.sha }}"}' \
            ${{ secrets.SLACK_WEBHOOK_URL }}
