name: CI - Lint, Tests & Coverage

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Installation des dependances
        run: npm ci

      - name: Verification ESLint
        run: npm run lint

  test:
    name: Tests Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Installation des dependances
        run: npm ci

      - name: Tests unitaires + couverture
        run: npm run test:ci

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 14

  ci-success:
    name: CI complet
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    if: always()

    steps:
      - name: Verifier que tout est vert
        run: |
          if [ '${{ needs.lint.result }}' != 'success' ]; then
            echo 'Lint a echoue !'
            exit 1
          fi

          if [ '${{ needs.test.result }}' != 'success' ]; then
            echo 'Tests ont echoue !'
            exit 1
          fi

          echo 'CI entierement vert'
