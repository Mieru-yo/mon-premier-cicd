name: CI/CD - Tests, Build, Staging & Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  STAGING_URL: https://mon-premier-cicd-staging.onrender.com
  PRODUCTION_URL: https://mon-premier-cicd-production.onrender.com

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login sur GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les metadonnees (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & Push l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [ docker ]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Trigger Render deploy hook (staging)
        run: curl -fsSL -X POST "${{ secrets.RENDER_STAGING_HOOK }}"

      - name: Health check staging
        run: |
          for i in {1..20}; do
            if curl -fsSL "${{ secrets.RENDER_STAGING_HEALTH_URL }}" > /dev/null; then
              echo "Staging healthy"
              exit 0
            fi
            echo "Waiting staging health... attempt $i"
            sleep 15
          done
          echo "Staging health-check failed"
          exit 1

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [ deploy-staging ]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Trigger Render deploy hook (production)
        run: curl -fsSL -X POST "${{ secrets.RENDER_PROD_HOOK }}"

      - name: Health check production
        run: |
          for i in {1..20}; do
            if curl -fsSL "${{ secrets.RENDER_PROD_HEALTH_URL }}" > /dev/null; then
              echo "Production healthy"
              exit 0
            fi
            echo "Waiting production health... attempt $i"
            sleep 15
          done
          echo "Production health-check failed"
          exit 1

  notify:
    name: Notify & Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [ lint, test, docker, deploy-staging, deploy-production ]

    steps:
      - name: Build run summary
        run: |
          test_status="${{ needs.test.result }}"
          staging_status="${{ needs.deploy-staging.result }}"
          production_status="${{ needs.deploy-production.result }}"

          test_icon="x"
          staging_icon="x"
          production_icon="x"

          if [ "$test_status" = "success" ]; then test_icon="check"; fi
          if [ "$staging_status" = "success" ]; then staging_icon="check"; fi
          if [ "$production_status" = "success" ]; then production_icon="check"; fi

          {
            echo "## Deployment Summary"
            echo ""
            echo "- ${test_icon} Tests: ${test_status}"
            echo "- ${staging_icon} Staging deployed at ${STAGING_URL} (status: ${staging_status})"
            echo "- ${production_icon} Production deployed at ${PRODUCTION_URL} (status: ${production_status})"
          } >> "$GITHUB_STEP_SUMMARY"
