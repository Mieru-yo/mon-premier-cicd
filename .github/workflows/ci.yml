name: CI - Lint, Tests & Coverage

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package*.json'
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node cached
        uses: ./.github/actions/setup-node-cached
        with:
          node-version: '18'

      - name: Verification ESLint
        run: npm run lint

  test:
    uses: ./.github/workflows/test-reusable.yml
    with:
      node-versions: '[18, 20]'
      coverage-threshold: 80
    secrets: inherit

  coverage-output:
    name: Coverage Output
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    outputs:
      lines: ${{ steps.extract.outputs.lines }}

    steps:
      - name: Telecharger les rapports de couverture
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-node-*
          merge-multiple: false
          path: all-coverage/

      - name: Calculer le coverage lines
        id: extract
        run: |
          summary="all-coverage/coverage-node-18/coverage-summary.json"
          if [ -f "$summary" ]; then
            PCT=$(node -e "const d=JSON.parse(require('fs').readFileSync('$summary','utf8')); console.log(d.total.lines.pct);")
            echo "lines=$PCT" >> $GITHUB_OUTPUT
            echo "Coverage lines: $PCT%"
          else
            echo "lines=0" >> $GITHUB_OUTPUT
          fi

  report:
    name: Rapport Coverage
    runs-on: ubuntu-latest
    needs: [lint, test, coverage-output]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Telecharger tous les rapports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-node-*
          merge-multiple: false
          path: all-coverage/

      - name: Afficher le resume dans Step Summary
        run: |
          echo '## Rapport de Couverture' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Version | Statements | Branches | Functions | Lines |' >> $GITHUB_STEP_SUMMARY
          echo '|---------|-----------|---------|----------|-------|' >> $GITHUB_STEP_SUMMARY
          for dir in all-coverage/coverage-node-*/; do
            version=$(basename $dir | sed 's/coverage-node-//')
            summary="$dir/coverage-summary.json"
            if [ -f "$summary" ]; then
              node -e "
                const d=JSON.parse(require('fs').readFileSync('$summary','utf8')).total;
                console.log('| Node '+$version+' | '+d.statements.pct+'% | '+d.branches.pct+'% | '+d.functions.pct+'% | '+d.lines.pct+'% |');
              " >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Afficher output coverage
        run: |
          pct='${{ needs.coverage-output.outputs.lines }}'
          echo "Coverage lines output: $pct%"
          node -e "
            const pct = Number(process.argv[1] || 0);
            const emoji = pct >= 80 ? 'SUCCESS' : 'ECHEC';
            console.log('Coverage lines via output: ' + emoji + ' (' + pct + '%)');
          " "$pct" >> $GITHUB_STEP_SUMMARY

      - name: Resultat global CI
        run: |
          lint_ok='${{ needs.lint.result }}'
          test_ok='${{ needs.test.result }}'
          echo "Lint: $lint_ok | Tests: $test_ok"
          if [ "$lint_ok" != 'success' ] || [ "$test_ok" != 'success' ]; then
            echo 'CI echoue' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo 'CI complet - tous les jobs sont verts' >> $GITHUB_STEP_SUMMARY
